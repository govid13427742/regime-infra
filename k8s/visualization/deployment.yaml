apiVersion: apps/v1
kind: Deployment
metadata:
  name: visualization
  namespace: regime
  labels:
    app: visualization
spec:
  replicas: 1
  selector:
    matchLabels:
      app: visualization
  template:
    metadata:
      labels:
        app: visualization
        app.kubernetes.io/part-of: regime-detection
    spec:
      containers:
        - name: visualization
          image: regime-visualization
          ports:
            - containerPort: 6005
          envFrom:
            - configMapRef:
                name: regime-config
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 6005
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 6005
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
