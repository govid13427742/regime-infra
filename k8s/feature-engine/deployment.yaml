apiVersion: apps/v1
kind: Deployment
metadata:
  name: feature-engine
  namespace: regime
  labels:
    app: feature-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: feature-engine
  template:
    metadata:
      labels:
        app: feature-engine
        app.kubernetes.io/part-of: regime-detection
    spec:
      containers:
        - name: feature-engine
          image: regime-feature-engine
          ports:
            - containerPort: 8002
          envFrom:
            - configMapRef:
                name: regime-config
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
