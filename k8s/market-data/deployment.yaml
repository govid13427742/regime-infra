apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-data
  namespace: regime
  labels:
    app: market-data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: market-data
  template:
    metadata:
      labels:
        app: market-data
        app.kubernetes.io/part-of: regime-detection
    spec:
      containers:
        - name: market-data
          image: regime-market-data
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: regime-config
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
