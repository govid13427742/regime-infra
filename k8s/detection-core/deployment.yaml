apiVersion: apps/v1
kind: Deployment
metadata:
  name: detection-core
  namespace: regime
  labels:
    app: detection-core
spec:
  replicas: 2
  selector:
    matchLabels:
      app: detection-core
  template:
    metadata:
      labels:
        app: detection-core
        app.kubernetes.io/part-of: regime-detection
    spec:
      containers:
        - name: detection-core
          image: regime-detection-core
          ports:
            - containerPort: 8003
          envFrom:
            - configMapRef:
                name: regime-config
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
